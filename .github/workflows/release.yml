name: Release App
on:
  push:
    branches: [ main ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Application
        run: |
          mkdir -p dist
          echo "Current legitimate application code" > dist/app.exe
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-binary
          path: dist/app.exe